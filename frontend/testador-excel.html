<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Premium - PDDE Control</title>
    
    <!-- Luckysheet CSS -->
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/css/luckysheet.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/css/pluginsCss.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/plugins.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/assets/iconfont/iconfont.css' />
    
    <!-- Scripts (Ordem Crítica para Fidelidade) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/js/plugin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/luckysheet.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luckyexcel@1.0.1/dist/luckyexcel.umd.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; overflow: hidden; }

        /* --- TELA DE SELEÇÃO (GLASSMORPHISM) --- */
        #picker-screen {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 40px;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .picker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .picker-header h1 { margin: 0; font-size: 1.8rem; background: linear-gradient(to right, #3b82f6, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .search-container { position: relative; margin-bottom: 25px; }
        .search-bar {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 12px 20px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }
        .search-bar:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); outline: none; }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 15px;
            overflow-y: auto;
            flex: 1;
            padding-bottom: 20px;
        }

        .file-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .file-card:hover { 
            background: rgba(59, 130, 246, 0.1); 
            border-color: #3b82f6; 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(0,0,0,0.5);
        }

        .file-icon { font-size: 2.5rem; }
        .file-info { flex: 1; overflow: hidden; }
        .file-name { font-weight: 600; font-size: 0.95rem; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-meta { font-size: 0.75rem; color: #94a3b8; margin-top: 5px; }

        .empty-state { grid-column: 1/-1; text-align: center; padding: 100px; color: #475569; }

        /* --- TELA DO EDITOR --- */
        #editor-screen { display: none; flex-direction: column; height: 100vh; }
        .editor-navbar {
            height: 60px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            z-index: 100;
        }

        .btn-back {
            background: #334155;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-back:hover { background: #475569; }

        #luckysheet { flex: 1; width: 100%; position: relative; }

        /* --- LOADING OVERLAY --- */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #1e293b;
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- OVERLAY DE CARREGAMENTO -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-msg" style="margin-top: 20px; font-weight: 500;">Processando planilha...</p>
    </div>

    <!-- TELA DE SELEÇÃO -->
    <div id="picker-screen">
        <div class="picker-header">
            <div>
                <h1>📊 Central de Edição PDDE</h1>
                <p style="color: #94a3b8; margin: 5px 0 0 0;">Selecione uma planilha para visualizar e ajustar formatação</p>
            </div>
            <div id="file-stats" style="font-weight: 600; color: #3b82f6;">Buscando arquivos...</div>
        </div>

        <div class="search-container">
            <input type="text" class="search-bar" placeholder="🔍 Buscar por nome da escola ou valor..." oninput="filterFiles(this.value)">
        </div>

        <div class="files-grid" id="files-grid">
            <div class="empty-state">Iniciando sistema...</div>
        </div>

        <div style="margin-top: 20px; display: flex; gap: 15px;">
            <input type="file" id="manual-upload" accept=".xlsx" style="display: none;" onchange="handleManualUpload(this)">
            <button class="btn-back" onclick="document.getElementById('manual-upload').click()" style="background: #0f172a; border: 1px solid #334155;">📂 Abrir Arquivo Externo</button>
            <button class="btn-back" onclick="fetchFiles()">🔄 Atualizar Lista</button>
        </div>
    </div>

    <!-- TELA DO EDITOR -->
    <div id="editor-screen">
        <div class="editor-navbar">
            <div style="display: flex; align-items: center; gap: 20px;">
                <button class="btn-back" onclick="closeEditor()">⬅ Voltar para Lista</button>
                <div id="current-filename" style="font-weight: 700; color: #3b82f6;">—</div>
            </div>
            <div style="color: #94a3b8; font-size: 0.85rem;">
                Dica: Ajuste as quebras de página no menu de Visualização
            </div>
        </div>
        <div id="luckysheet"></div>
    </div>

    <script>
        let allFiles = [];

        $(document).ready(function() {
            fetchFiles();
        });

        // --- BUSCA DE ARQUIVOS ---
        async function fetchFiles() {
            try {
                const res = await fetch('/api/output-files');
                const data = await res.json();
                if (data.success) {
                    allFiles = data.files;
                    renderFiles(allFiles);
                    document.getElementById('file-stats').textContent = `${allFiles.length} Planilhas Disponíveis`;
                }
            } catch (err) {
                console.error("Erro ao buscar lista:", err);
                document.getElementById('file-stats').textContent = "Erro ao carregar lista";
            }
        }

        function renderFiles(files) {
            const grid = document.getElementById('files-grid');
            if (!files || files.length === 0) {
                grid.innerHTML = '<div class="empty-state">Nenhum arquivo .xlsx encontrado na pasta /output</div>';
                return;
            }

            grid.innerHTML = files.map(f => `
                <div class="file-card" onclick="openFile('${f.name.replace(/'/g, "\\'")}')">
                    <div class="file-icon">📈</div>
                    <div class="file-info">
                        <div class="file-name" title="${f.name}">${f.name}</div>
                        <div class="file-meta">
                            ${(f.size / 1024).toFixed(1)} KB &nbsp;·&nbsp; 
                            ${new Date(f.modified).toLocaleDateString()}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterFiles(term) {
            const filtered = allFiles.filter(f => f.name.toLowerCase().includes(term.toLowerCase()));
            renderFiles(filtered);
        }

        // --- MOTOR DE PROCESSAMENTO ---
        function processarPlanilha(file, fileName) {
            showLoading(`Processando ${fileName}...`);
            
            LuckyExcel.transformExcelToLuckysheet(file, function(exportJson, luckysheetfile) {
                if (!exportJson.sheets || exportJson.sheets.length === 0) {
                    hideLoading();
                    alert("Erro: Não foi possível ler os dados desta planilha.");
                    return;
                }

                try {
                    if (window.luckysheet) luckysheet.destroy();

                    setTimeout(() => {
                        luckysheet.create({
                            container: 'luckysheet',
                            lang: 'pt',
                            showinfobar: false,
                            data: exportJson.sheets,
                            title: fileName,
                        });
                        
                        document.getElementById('picker-screen').style.display = 'none';
                        document.getElementById('editor-screen').style.display = 'flex';
                        hideLoading();
                    }, 500);
                } catch (err) {
                    console.error("Erro render:", err);
                    hideLoading();
                    alert("Erro ao desenhar planilha.");
                }
            }, function(err) {
                hideLoading();
                alert("Erro na conversão do arquivo.");
            });
        }

        // --- BOTÕES ---
        async function openFile(fileName) {
            try {
                const url = `/output/${encodeURIComponent(fileName)}`;
                const response = await fetch(url);
                const blob = await response.blob();
                const file = new File([blob], fileName);
                document.getElementById('current-filename').textContent = fileName;
                processarPlanilha(file, fileName);
            } catch (err) {
                alert("Erro ao buscar arquivo no servidor.");
            }
        }

        function handleManualUpload(input) {
            if (!input.files.length) return;
            const file = input.files[0];
            document.getElementById('current-filename').textContent = file.name;
            processarPlanilha(file, file.name);
            input.value = '';
        }

        function closeEditor() {
            document.getElementById('editor-screen').style.display = 'none';
            document.getElementById('picker-screen').style.display = 'flex';
            fetchFiles();
        }

        function showLoading(msg) {
            document.getElementById('loading-msg').textContent = msg;
            document.getElementById('loading-overlay').style.display = 'flex';
        }
        function hideLoading() {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
