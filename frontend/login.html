<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PDDE Control Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #030000;
            --card-bg: rgba(10, 0, 0, 0.98);
            --primary: #ff0000;
            --primary-hover: #ff3333;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --accent: #880000;
            --border: rgba(255, 0, 0, 0.3);
            --glow: 0 0 50px rgba(255, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Manrope', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 0, 0, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(153, 0, 0, 0.2) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-main);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 10px 20px rgba(153, 0, 0, 0.3);
        }

        .logo-icon i {
            color: white;
            width: 32px;
            height: 32px;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 700;
        }

        .logo-text span {
            color: var(--primary);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-dim);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            width: 18px;
            height: 18px;
        }

        .form-group input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 12px 12px 42px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(153, 0, 0, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(to right, var(--primary), var(--accent));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(153, 0, 0, 0.3);
            filter: brightness(1.1);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ff3131;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .spinner {
            animation: rotate 2s linear infinite;
            width: 18px;
            height: 18px;
            display: none;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">
                    <i data-lucide="shield-check"></i>
                </div>
                <div class="logo-text">PDDE <span>Control</span></div>
            </div>

            <div class="login-header">
                <h1>Bem-vindo de volta</h1>
                <p>Acesse seu painel administrativo</p>
            </div>

            <div id="login-error" class="alert">Usuário ou senha incorretos</div>

            <form id="login-form">
                <div class="form-group">
                    <label>Usuário</label>
                    <div class="input-wrapper">
                        <i data-lucide="user"></i>
                        <input type="text" id="username" placeholder="Seu usuário" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btn-submit">
                    <span>Entrar no Sistema</span>
                    <i data-lucide="arrow-right" class="arrow-icon"></i>
                    <i data-lucide="loader" class="spinner"></i>
                </button>
            </form>

            <div class="login-footer">
                &copy; 2026 PDDE Control Premium. Todos os direitos reservados.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        lucide.createIcons();
        
        const API_URL = 'http://localhost:3000/api';
        const loginForm = document.getElementById('login-form');
        const btnSubmit = document.getElementById('btn-submit');
        const errorAlert = document.getElementById('login-error');
        const spinner = document.querySelector('.spinner');
        const arrow = document.querySelector('.arrow-icon');

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            
            const usuario = document.getElementById('username').value;
            const senha = document.getElementById('password').value;

            // Feedback visual
            errorAlert.style.display = 'none';
            btnSubmit.disabled = true;
            spinner.style.display = 'block';
            arrow.style.display = 'none';

            try {
                const response = await axios.post(`${API_URL}/auth/login`, { usuario, senha });
                
                if (response.data.success) {
                    // Guarda o token e info do usuário
                    localStorage.setItem('token', response.data.token);
                    localStorage.setItem('user', JSON.stringify(response.data.user));
                    
                    // Redireciona para o Dashboard Unificado
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error('Erro no login:', error);
                errorAlert.style.display = 'block';
                errorAlert.innerText = error.response?.data?.error || 'Erro ao conectar ao servidor';
            } finally {
                btnSubmit.disabled = false;
                spinner.style.display = 'none';
                arrow.style.display = 'block';
            }
        };

        // Verifica se já está logado
        if (localStorage.getItem('token')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
